<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jollibee - Drinks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header> 

  <img src="images/jollibee logo.jpg" alt="Jollibee Logo" width="120">
  <h1>Jollibee Drinks</h1>

  <nav>
    <a href="index.html">Main Course</a> |
    <a href="drinks.html">Drinks</a> |
    <a href="dessert.html">Dessert</a>
  </nav>

  </header> 

  <section class="menu">
    <h2>Drinks</h2>

    <div class="item">
      <span>Coke (₱45)</span> 
      <input type="number" id="cokeQty" min="0" value="0">
    </div>
    <div class="item">
      <span>Pineapple Juice (₱50)</span>
      <input type="number" id="juiceQty" min="0" value="0">
    </div>
    <div class="item">
      <span>Iced Tea (₱50)</span>
      <input type="number" id="teaQty" min="0" value="0">
    </div>

    <label for="age">Enter your age:</label>
    <input type="number" id="age" min="0">

    <button onclick="computeDrinks()">Place Order</button>

    <h3>Order Summary</h3>
    <p>Original Total: ₱<span id="originalTotal">0</span></p>
    <p>Discount: ₱<span id="discount">0</span></p>
    <p>Final Total: ₱<span id="finalTotal">0</span></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
